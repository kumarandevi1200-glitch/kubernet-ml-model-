apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-worker
  labels:
    app: ml-serving-worker
spec:
  selector:
    matchLabels:
      app: ml-serving-worker
  template:
    metadata:
      labels:
        app: ml-serving-worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.workerRepo }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ml-serving-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
